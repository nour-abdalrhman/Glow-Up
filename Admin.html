<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Glow Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="blob-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-logo">Glow Up</div>
    <div class="sidebar-sub">Admin Panel</div>
    <nav class="sidebar-nav">
        <a href="#" class="snav active"><i class="fas fa-box"></i> Orders</a>
        <a href="index.html" class="snav"><i class="fas fa-store"></i> View Store</a>
        <a href="Auth.html" class="snav"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
</aside>

<!-- MAIN -->
<main class="admin-main">

    <!-- HEADER -->
    <div class="admin-header">
        <div>
            <h1 class="admin-title">Orders <em>Dashboard</em></h1>
            <p class="admin-sub">Manage all customer orders 💕</p>
        </div>
        <button class="btn-refresh" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>

    <!-- STATS -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-ico">📦</div>
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-lbl">Total Orders</div>
        </div>
        <div class="stat-card">
            <div class="stat-ico">⏳</div>
            <div class="stat-num" id="statPending">0</div>
            <div class="stat-lbl">Pending</div>
        </div>
        <div class="stat-card">
            <div class="stat-ico">🚚</div>
            <div class="stat-num" id="statShipped">0</div>
            <div class="stat-lbl">Shipped</div>
        </div>
        <div class="stat-card">
            <div class="stat-ico">💰</div>
            <div class="stat-num" id="statRevenue">EGP 0</div>
            <div class="stat-lbl">Total Revenue</div>
        </div>
    </div>

    <!-- FILTER -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search by name, email or order #..." oninput="filterOrders()" />
        <select id="statusFilter" onchange="filterOrders()">
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
        </select>
    </div>

    <!-- ORDERS TABLE -->
    <div class="table-wrap">
        <div class="loading" id="loading"><i class="fas fa-spinner fa-spin"></i> Loading orders...</div>
        <table class="orders-table" id="ordersTable" style="display:none">
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Payment</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none">
            <div style="font-size:48px">📭</div>
            <p>No orders yet, darling 💕</p>
        </div>
    </div>
</main>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        <div class="modal-title" id="modalTitle">Order Details</div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    let allOrders = [];

    /* ── LOAD ORDERS ── */
    function loadOrders() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('ordersTable').style.display = 'none';
        document.getElementById('emptyState').style.display = 'none';

        fetch('get_orders.php')
        .then(r => r.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            if (data.success) {
                allOrders = data.orders;
                updateStats(allOrders);
                renderOrders(allOrders);
            }
        })
        .catch(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
        });
    }

    /* ── STATS ── */
    function updateStats(orders) {
        const pending  = orders.filter(o => o.status === 'pending').length;
        const shipped  = orders.filter(o => o.status === 'shipped').length;
        const revenue  = orders.reduce((s, o) => s + parseFloat(o.total), 0);
        document.getElementById('statTotal').textContent   = orders.length;
        document.getElementById('statPending').textContent = pending;
        document.getElementById('statShipped').textContent = shipped;
        document.getElementById('statRevenue').textContent = 'EGP ' + revenue.toFixed(0);
    }

    /* ── RENDER ── */
    function renderOrders(orders) {
        if (!orders.length) {
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('ordersTable').style.display = 'none';
            return;
        }
        document.getElementById('ordersTable').style.display = 'table';
        document.getElementById('emptyState').style.display = 'none';

        const statusColors = {
            pending:   '#f5c4a8', confirmed: '#b8dbd8',
            shipped:   '#7ab8b0', delivered: '#a8d8b8', cancelled: '#f5dce0'
        };

        document.getElementById('ordersBody').innerHTML = orders.map(o => `
            <tr onclick="showDetail(${o.id})" style="cursor:pointer">
                <td><span class="order-num">${o.order_number}</span></td>
                <td>
                    <div class="cust-name">${o.first_name} ${o.last_name}</div>
                    <div class="cust-email">${o.email}</div>
                </td>
                <td>${Array.isArray(o.items) ? o.items.length : 0} items</td>
                <td><strong>EGP ${parseFloat(o.total).toFixed(2)}</strong></td>
                <td><span class="pay-badge">${o.payment_method}</span></td>
                <td>${new Date(o.created_at).toLocaleDateString('en-GB')}</td>
                <td>
                    <span class="status-badge" style="background:${statusColors[o.status] || '#f5dce0'}">
                        ${o.status}
                    </span>
                </td>
                <td onclick="event.stopPropagation()">
                    <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
                        <option value="pending"   ${o.status==='pending'   ?'selected':''}>Pending</option>
                        <option value="confirmed" ${o.status==='confirmed' ?'selected':''}>Confirmed</option>
                        <option value="shipped"   ${o.status==='shipped'   ?'selected':''}>Shipped</option>
                        <option value="delivered" ${o.status==='delivered' ?'selected':''}>Delivered</option>
                        <option value="cancelled" ${o.status==='cancelled' ?'selected':''}>Cancelled</option>
                    </select>
                </td>
            </tr>
        `).join('');
    }

    /* ── FILTER ── */
    function filterOrders() {
        const q      = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const filtered = allOrders.filter(o => {
            const matchQ = !q || o.order_number.toLowerCase().includes(q)
                || o.first_name.toLowerCase().includes(q)
                || o.last_name.toLowerCase().includes(q)
                || o.email.toLowerCase().includes(q);
            const matchS = status === 'all' || o.status === status;
            return matchQ && matchS;
        });
        renderOrders(filtered);
    }

    /* ── UPDATE STATUS ── */
    function updateStatus(id, status) {
        fetch('Update order status.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order_id: id, status })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                const order = allOrders.find(o => o.id === id);
                if (order) order.status = status;
                updateStats(allOrders);
            }
        });
    }

    /* ── DETAIL MODAL ── */
    function showDetail(id) {
        const o = allOrders.find(x => x.id === id);
        if (!o) return;
        document.getElementById('modalTitle').textContent = 'Order ' + o.order_number;
        const items = Array.isArray(o.items) ? o.items.map(i =>
            `<div class="detail-item"><img src="${i.img}" /><div><div>${i.name}</div><div>x${i.qty} — EGP ${(i.price*i.qty).toFixed(2)}</div></div></div>`
        ).join('') : '';

        document.getElementById('modalBody').innerHTML = `
            <div class="detail-grid">
                <div class="detail-sec">
                    <div class="detail-sec-title">👤 Customer</div>
                    <p>${o.first_name} ${o.last_name}</p>
                    <p>${o.email}</p>
                    <p>${o.phone}</p>
                </div>
                <div class="detail-sec">
                    <div class="detail-sec-title">📍 Address</div>
                    <p>${o.address}</p>
                    <p>${o.city}, ${o.governorate}</p>
                    ${o.apartment ? `<p>${o.apartment}</p>` : ''}
                </div>
                <div class="detail-sec">
                    <div class="detail-sec-title">🚚 Shipping</div>
                    <p>${o.shipping_method}</p>
                    <div class="detail-sec-title" style="margin-top:12px">💳 Payment</div>
                    <p>${o.payment_method}</p>
                </div>
                <div class="detail-sec">
                    <div class="detail-sec-title">💰 Summary</div>
                    <p>Subtotal: EGP ${parseFloat(o.subtotal).toFixed(2)}</p>
                    <p>Shipping: EGP ${parseFloat(o.shipping_cost).toFixed(2)}</p>
                    <p><strong>Total: EGP ${parseFloat(o.total).toFixed(2)}</strong></p>
                </div>
            </div>
            <div class="detail-sec-title" style="margin:20px 0 12px">🛍️ Items</div>
            <div class="detail-items">${items}</div>
            ${o.notes ? `<div class="detail-sec-title" style="margin:16px 0 8px">📝 Notes</div><p style="color:var(--text-soft);font-size:13px">${o.notes}</p>` : ''}
        `;
        document.getElementById('detailModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('detailModal').classList.remove('show');
    }

    document.getElementById('detailModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    loadOrders();
</script>
</body>
</html>
